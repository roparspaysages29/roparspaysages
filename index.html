<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ropars Paysages</title>

<style>
body{font-family:Arial;margin:0}

/* HEADER */
header{
  background:#1f6b08;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* HERO */
.hero{
  height:50vh;
  background:url("fond-carte-visite.jpg") center/cover no-repeat;
}

/* TABS */
.tabs{text-align:center;margin:20px}
.tabs button{
  margin:5px;
  padding:10px 20px;
  border:none;
  background:#1f6b08;
  color:#fff;
  cursor:pointer;
}

/* GALERIE */
.tab{
  display:none;
  padding:20px;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.tab.active{display:grid}

.tab img{
  width:100%;
  border-radius:10px;
}

/* BOUTON CACHÉ */
#admin-btn{
  position:fixed;
  bottom:5px;
  right:5px;
  width:25px;
  height:25px;
  opacity:0;
}

/* LOGIN */
#login-box{
  position:fixed;
  bottom:50px;
  right:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  display:none;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input{
  display:block;
  margin:5px 0;
  padding:8px;
}

button{
  padding:10px;
  background:#1f6b08;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<header>
  <h1>Ropars Paysages</h1>
</header>

<div class="hero"></div>

<section>
  <h2 style="text-align:center">Galerie</h2>

  <div class="tabs">
    <button onclick="showTab('creation')">Création</button>
    <button onclick="showTab('entretien')">Entretien</button>
  </div>

  <div id="creation" class="tab active"></div>
  <div id="entretien" class="tab"></div>
</section>

<!-- ADMIN -->
<div id="admin-btn" onclick="openLogin()"></div>

<div id="login-box">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Connexion</button>
</div>

<input type="file" id="upload" hidden>

<script>
let isLogged = false;
let currentTab = "creation";

/* SWITCH ONGLET */
function showTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* LOGIN */
function openLogin(){
  document.getElementById("login-box").style.display = "block";
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(email === "jonathanropars8@gmail.com" && pass === "paysagiste"){
    isLogged = true;
    alert("Connecté !");
    document.getElementById("login-box").style.display = "none";
    document.getElementById("upload").click();
  } else {
    alert("Identifiants incorrects");
  }
}

/* UPLOAD IMAGE */
document.getElementById("upload").addEventListener("change", function(e){
  if(!isLogged) return;

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    const img = document.createElement("img");
    img.src = reader.result;

    document.getElementById(currentTab).appendChild(img);
    saveImages();
  }

  reader.readAsDataURL(file);
});

/* SAVE LOCAL */
function saveImages(){
  const data = {
    creation: document.getElementById("creation").innerHTML,
    entretien: document.getElementById("entretien").innerHTML
  };
  localStorage.setItem("galerie", JSON.stringify(data));
}

function loadImages(){
  const data = JSON.parse(localStorage.getItem("galerie"));
  if(!data) return;

  document.getElementById("creation").innerHTML = data.creation;
  document.getElementById("entretien").innerHTML = data.entretien;
}

loadImages();
</script>

</body>
</html>
